<!doctype html><html><head><meta charset="UTF-8"/><meta http-equiv="X-UA-Compatible" content="IE=Edge"/><meta name="viewport" content="width=device-width,initial-scale=1"><title>Word Add-in with License & API</title><script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script><style>body{width:100%;height:100vh;margin:0;font-family:'Segoe UI',sans-serif;background-color:#f4f4f4}#container,#license-gate{display:none;padding:20px}.card{background:#fff;padding:20px;border-radius:4px;box-shadow:0 2px 4px rgba(0,0,0,.1)}input{width:100%;padding:10px;margin:10px 0;box-sizing:border-box}button{background-color:#0078d4;color:#fff;border:none;padding:10px;cursor:pointer;width:100%;font-weight:700;margin-bottom:10px}button:hover{background-color:#005a9e}.secondary-btn{background-color:#e1e1e1;color:#333;font-size:12px}</style><script defer="defer" src="polyfill.js"></script><script defer="defer" src="react.js"></script><script defer="defer" src="taskpane.js"></script></head><body><div id="license-gate"><div class="card"><h3>License Required</h3><input id="license-key" placeholder="Enter Key"> <button id="activate-btn">Activate</button><p id="error-msg" style="color:red;display:none">Invalid Key</p></div></div><div id="container"><div class="card"><h2 style="color:#0078d4">Premium Tools</h2><p>Click below to interact with your document:</p><button id="insert-text-btn">Insert Welcome Text</button> <button id="highlight-btn" style="background-color:#2b579a">Highlight Selection</button><hr style="margin:20px 0"><button class="secondary-btn" id="reset-btn">Logout / Reset License</button></div></div><script>const VALID_KEY="PREMIUM-2026-USER",STORAGE_KEY="addin_license_key";function checkLicense(){const e=localStorage.getItem(STORAGE_KEY)===VALID_KEY;document.getElementById("license-gate").style.display=e?"none":"block",document.getElementById("container").style.display=e?"block":"none"}Office.onReady(function(e){e.host===Office.HostType.Word&&(checkLicense(),document.getElementById("activate-btn").onclick=function(){const e=document.getElementById("license-key").value;e===VALID_KEY?(localStorage.setItem(STORAGE_KEY,e),checkLicense()):document.getElementById("error-msg").style.display="block"},document.getElementById("reset-btn").onclick=function(){localStorage.removeItem(STORAGE_KEY),location.reload()},document.getElementById("insert-text-btn").onclick=function(){Word.run(function(e){return e.document.body.insertParagraph("Hello! This text was inserted via the Premium Add-in.",Word.InsertLocation.end),e.sync()}).catch(function(e){console.log("Error: "+e)})},document.getElementById("highlight-btn").onclick=function(){Word.run(function(e){const n=e.document.getSelection();return n.font.highlightColor="Yellow",n.font.bold=!0,e.sync()}).catch(function(e){console.log("Error: "+e)})})})</script></body></html>
