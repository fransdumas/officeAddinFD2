<head><script defer="defer" src="polyfill.js"></script><script defer="defer" src="react.js"></script><script defer="defer" src="taskpane.js"></script></head><body style="width:100%;height:100%;margin:0;padding:0;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif"><div id="license-gate" style="display:none;padding:20px"><h3>License Required</h3><p>Please enter your key to activate this add-in:</p><input id="license-key" style="width:100%;padding:8px;margin-bottom:10px" placeholder="XXXX-XXXX-XXXX"> <button id="activate-btn" style="background-color:#0078d4;color:#fff;border:none;padding:8px 15px;cursor:pointer">Activate</button><p id="error-msg" style="color:red;display:none;margin-top:10px">Invalid License Key</p></div><div id="container" style="display:none"></div><div id="tridentmessage" style="display:none;padding:10">This add-in will not run in your version of Office. Please upgrade...</div><script>if(-1!==navigator.userAgent.indexOf("Trident")||-1!==navigator.userAgent.indexOf("Edge"))document.getElementById("tridentmessage").style.display="block",document.getElementById("container").style.display="none";else{localStorage.getItem("addin_license_key")==="PREMIUM-2026-USER"?document.getElementById("container").style.display="block":document.getElementById("license-gate").style.display="block"}document.getElementById("activate-btn").onclick=function(){const e=document.getElementById("license-key").value;"PREMIUM-2026-USER"===e?(localStorage.setItem("addin_license_key",e),document.getElementById("license-gate").style.display="none",document.getElementById("container").style.display="block"):document.getElementById("error-msg").style.display="block"}</script></body>
